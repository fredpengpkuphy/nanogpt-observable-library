<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suggestions — nanoGPT Observable Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=32">
</head>
<body class="suggest-page">
  <div class="curator-bar" id="curatorBar" hidden>
    <div class="curator-bar-inner" id="curatorBarInner"></div>
  </div>
  <main class="announce-shell">
    <header class="select-header select-header-row">
      <div>
        <h1>Suggestions</h1>
        <p>Public ideas for improving this site. Curator replies are also public.</p>
      </div>
      <div class="select-header-links" id="suggestHeaderLinks">
        <a class="header-link" href="index.html">← Home</a>
        <a class="header-link" href="announcements.html">Announcements</a>
        <a class="header-link" href="select.html">Select run →</a>
      </div>
    </header>

    <section class="announce-composer panel">
      <h2>Share a suggestion</h2>
      <textarea id="suggestNewText" rows="3" maxlength="2000" placeholder="What would make this explorer more useful?"></textarea>
      <div class="announce-composer-actions">
        <button type="button" class="chart-btn note-submit" id="suggestPublish">Post suggestion</button>
        <span class="notes-admin-status" id="suggestStatus"></span>
      </div>
    </section>

    <p class="announce-empty" id="suggestEmpty" hidden>No suggestions yet — be the first.</p>
    <div class="announce-list" id="suggestList"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/notes-config.js?v=3"></script>
  <script src="js/notes-store.js?v=9"></script>
  <script src="js/announcement-banner.js?v=2"></script>
  <script src="js/curator-ui.js?v=5"></script>
  <script src="js/suggestions-ui.js?v=1"></script>
  <script>
    if (typeof CuratorUI !== "undefined") CuratorUI.wire();
    else if (typeof AnnouncementBanner !== "undefined") AnnouncementBanner.wire();
    if (typeof SuggestionsUI !== "undefined") SuggestionsUI.wire();
    (function () {
      if (typeof CuratorUI === "undefined" || !CuratorUI.withAdminParam) return;
      document.querySelectorAll("#suggestHeaderLinks a.header-link").forEach((a) => {
        const href = a.getAttribute("href");
        if (href) a.setAttribute("href", CuratorUI.withAdminParam(href));
      });
    })();
  </script>
</body>
</html>
