<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observable Formulas — nanoGPT Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=23">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body class="ref-page">
  <header class="app-header">
    <div>
      <h1>Observable Formulas</h1>
      <p id="refSubtitle">Loading catalog…</p>
    </div>
    <div class="header-actions">
      <a class="header-link" href="index.html">← Home</a>
      <a class="header-link" href="select.html">Select run →</a>
    </div>
  </header>

  <main class="ref-shell">
    <section class="panel ref-toolbar" aria-label="Catalog filters">
      <div class="ref-toolbar-inner">
        <div class="ref-toolbar-controls">
          <input
            type="search"
            id="refSearch"
            class="ref-search-input"
            placeholder="Search by selector, reduction, module…"
            aria-label="Search formulas"
            autocomplete="off"
          />
          <select id="refSourceFilter" class="ref-select" aria-label="Filter by source">
            <option value="">All sources</option>
          </select>
          <select id="refReductionFilter" class="ref-select" aria-label="Filter by reduction">
            <option value="">All reductions</option>
          </select>
        </div>
        <div class="ref-toolbar-aside">
          <span id="refCount" class="ref-count">—</span>
          <div class="ref-pager">
            <button type="button" class="chart-btn ref-page-btn" id="refPrevPage" title="Previous page" aria-label="Previous page">‹</button>
            <label class="ref-page-jump" title="Type a page number and press Enter">
              <input type="number" id="refPageInput" class="ref-page-input" min="1" step="1" inputmode="numeric" aria-label="Page number" />
              <span class="ref-page-total">/ <span id="refPageTotal">—</span></span>
            </label>
            <button type="button" class="chart-btn ref-page-btn" id="refNextPage" title="Next page" aria-label="Next page">›</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel ref-catalog" id="refCatalog" aria-live="polite">
      <p class="ref-loading" id="refLoading">Loading formulas…</p>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="js/observable_defs.js?v=5"></script>
  <script defer src="js/reference.js?v=6"></script>
</body>
</html>
