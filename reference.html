<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observable Formulas — nanoGPT Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
</head>
<body class="ref-page">
  <header class="app-header">
    <div>
      <h1>Observable Formulas</h1>
      <p id="refSubtitle">Loading catalog…</p>
    </div>
    <div class="header-actions">
      <a class="header-link" href="index.html">← Home</a>
      <a class="header-link" href="select.html">Select run →</a>
    </div>
  </header>

  <main class="ref-shell">
    <section class="panel ref-toolbar">
      <div class="ref-toolbar-row">
        <label class="ref-search">
          <span class="ref-search-label">Search</span>
          <input type="search" id="refSearch" placeholder="selector / reduction / module / id…" autocomplete="off" />
        </label>
        <label class="ref-filter">
          <span>Source</span>
          <select id="refSourceFilter">
            <option value="">All</option>
          </select>
        </label>
        <label class="ref-filter">
          <span>Reduction</span>
          <select id="refReductionFilter">
            <option value="">All</option>
          </select>
        </label>
      </div>
      <div class="ref-toolbar-meta">
        <span id="refCount">—</span>
        <div class="ref-pager">
          <button type="button" class="chart-btn" id="refPrevPage">Previous</button>
          <span id="refPageLabel">—</span>
          <button type="button" class="chart-btn" id="refNextPage">Next</button>
        </div>
      </div>
    </section>

    <section class="panel ref-catalog" id="refCatalog" aria-live="polite">
      <p class="ref-loading" id="refLoading">Loading formulas…</p>
    </section>
  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="js/observable_defs.js?v=5"></script>
  <script defer src="js/reference.js?v=4"></script>
</body>
</html>
