  <script src="js/curator-ui.js?v=5"></script>
  <script>
    (function () {
      try {
        const params = new URLSearchParams(location.search);
        if (params.has("admin")) {
          sessionStorage.setItem("notesAdminEntry", "1");
          location.replace("select.html?admin=1");
          return;
        }
        if (sessionStorage.getItem("notesAdminEntry") === "1") {
          const a = document.getElementById("startExploration");
          if (a) a.href = "select.html?admin=1";
        }
      } catch (_) {}
      if (typeof AnnouncementBanner !== "undefined") AnnouncementBanner.wire();
      // Homepage has no curator bar unless redirected; still show public banner.
    })();
  </script>
