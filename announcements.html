<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements — nanoGPT Observable Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=33">
</head>
<body class="announce-page">
  <div class="curator-bar" id="curatorBar" hidden>
    <div class="curator-bar-inner" id="curatorBarInner"></div>
  </div>
  <main class="announce-shell">
    <header class="select-header select-header-row">
      <div>
        <h1>Announcements</h1>
        <p>Site-wide updates from the curator.</p>
      </div>
      <div class="select-header-links" id="announceHeaderLinks">
        <a class="header-link" href="index.html">← Home</a>
        <a class="header-link" href="suggestions.html">Suggestions</a>
        <a class="header-link" href="select.html">Select run →</a>
      </div>
    </header>

    <section class="announce-composer panel" id="announceComposer" hidden>
      <h2>Publish a new announcement</h2>
      <textarea id="announceNewText" rows="3" maxlength="1000" placeholder="Visible on every page…"></textarea>
      <div class="announce-composer-actions">
        <button type="button" class="chart-btn note-submit" id="announcePublish">Publish</button>
        <span class="notes-admin-status" id="announcePageStatus"></span>
      </div>
      <div class="announce-migrate" id="announceMigrateWrap" hidden>
        <p>An older single announcement is still stored in the legacy format.</p>
        <button type="button" class="chart-btn" id="announceMigrate">Move into list</button>
      </div>
    </section>

    <p class="announce-empty" id="announceEmpty" hidden>No announcements yet.</p>
    <div class="announce-list" id="announceList"></div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="js/notes-config.js?v=3"></script>
  <script src="js/notes-store.js?v=13"></script>
  <script src="js/announcement-banner.js?v=2"></script>
  <script src="js/curator-ui.js?v=6"></script>
  <script src="js/announcements-ui.js?v=1"></script>
  <script>
    if (typeof CuratorUI !== "undefined") CuratorUI.wire();
    else if (typeof AnnouncementBanner !== "undefined") AnnouncementBanner.wire();
    if (typeof AnnouncementsUI !== "undefined") AnnouncementsUI.wire();
    (function () {
      if (typeof CuratorUI === "undefined" || !CuratorUI.withAdminParam) return;
      document.querySelectorAll("#announceHeaderLinks a.header-link").forEach((a) => {
        const href = a.getAttribute("href");
        if (href) a.setAttribute("href", CuratorUI.withAdminParam(href));
      });
    })();
  </script>
</body>
</html>
